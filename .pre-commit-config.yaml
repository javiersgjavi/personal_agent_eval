repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: check-no-leaked-secrets
        name: check no leaked secrets
        entry: uv run python scripts/check_no_leaked_secrets.py
        language: system
        pass_filenames: true
