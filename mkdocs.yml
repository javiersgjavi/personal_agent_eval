site_name: personal_agent_eval
site_description: Open evaluation framework for LLM and agent-based systems
# site_url is injected by CI via MKDOCS_SITE_URL env var.
# Override locally with: MKDOCS_SITE_URL=http://localhost:8000 uv run mkdocs serve
site_url: !ENV [MKDOCS_SITE_URL, 'http://localhost:8000']

repo_url: !ENV [MKDOCS_REPO_URL, '']
repo_name: !ENV [MKDOCS_REPO_NAME, '']
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Concepts: concepts.md
  - How It Works:
      - Config Model: config_model.md
      - Configuration Reference: configuration.md
      - CLI Reference: cli.md
      - Fingerprints & Reuse: fingerprints.md
      - OpenClaw Agents: openclaw_agents.md
  - Evaluation:
      - Deterministic Checks: deterministic_checks.md
      - Judge Results: judge_results.md
      - Hybrid Evaluation: hybrid_evaluation.md
  - Outputs:
      - Run Artifacts: run_artifacts.md
      - Reporting: reporting.md
  - Examples:
      - Runnable Examples: examples/runnable_examples.md
      - llm_probe Walkthrough: examples/minimal_llm_probe.md
      - OpenClaw Walkthrough: examples/minimal_openclaw.md

docs_dir: docs
