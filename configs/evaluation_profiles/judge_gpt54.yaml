schema_version: 1
evaluation_profile_id: judge_gpt54
title: Judge with openai/gpt-5.4
judges:
  - judge_id: gpt54_judge
    type: llm_probe
    model: openai/gpt-5.4
judge_runs:
  - judge_run_id: gpt54_single
    judge_id: gpt54_judge
    repetitions: 1
aggregation:
  method: median
final_aggregation:
  default_policy: judge_only
  dimensions:
    process:
      policy: weighted
      judge_weight: 0.9
      deterministic_weight: 0.1
  final_score_weights:
    task: 0.3
    process: 0.15
    autonomy: 0.2
    closeness: 0.1
    efficiency: 0.15
    spark: 0.1
anchors:
  enabled: false
  references: []
security_policy:
  allow_local_python_hooks: false
  network_access: deny
  redact_secrets: true
