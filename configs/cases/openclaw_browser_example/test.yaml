schema_version: 1
case_id: openclaw_browser_example
title: OpenClaw browser example
runner:
  type: openclaw
input:
  messages:
    - role: user
      content: |
        Usa el navegador o búsqueda web para encontrar una página oficial de Python sobre la
        versión estable actual.
        Crea un `report.md` en el workspace con:
        - un título `# Browser Example`
        - la URL oficial consultada
        - una frase corta justificando por qué esa fuente es fiable

        Luego responde en 2-3 líneas resumiendo lo encontrado.
  context:
    openclaw:
      expected_artifact: report.md
expectations:
  hard_expectations:
    - text: Produces report.md in the workspace.
    - text: Includes an official Python URL in report.md.
  soft_expectations:
    - text: Final response summarizes the result briefly.
rubric:
  version: 1
  scale:
    min: 0
    max: 10
    anchors:
      "10": report.md exists with an official Python URL and a brief justification; final response summarizes in 2–3 lines.
      "7": Mostly complete; minor omissions or clarity issues.
      "4": Missing a required artifact/content or weak sourcing/justification.
      "0": No attempt / irrelevant / empty output.
  criteria:
    - name: Required artifact
      what_good_looks_like: report.md is created and contains the required sections and an official URL.
      what_bad_looks_like: report.md missing or does not include an official Python URL.
    - name: Justification and summary
      what_good_looks_like: Includes a short reliability justification; final answer is brief and accurate.
      what_bad_looks_like: No justification or verbose/unclear final response.
  scoring_instructions: >
    Use this rubric to set overall.score. If a hard expectation or deterministic check fails,
    cap overall.score (typically <= 4). Cite 1–3 decisive facts in overall.evidence.
deterministic_checks:
  - check_id: openclaw-browser-example-final
    dimensions:
      - task
    declarative:
      kind: final_response_present
  - check_id: openclaw-browser-example-report
    dimensions:
      - process
    declarative:
      kind: openclaw_workspace_file_present
      relative_path: report.md
      contains: python.org
tags:
  - example
  - openclaw
  - browser
  - web
