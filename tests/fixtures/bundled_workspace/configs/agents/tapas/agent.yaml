schema_version: 1
agent_id: tapas
title: Tapas
description: Agente personal con workspace tipo OpenClaw (archivos estándar, memoria y skills).
tags:
  - tapas
  - openclaw
openclaw:
  identity:
    name: Tapas
  agents_defaults:
    sandbox: workspace-write
    # OpenClaw has no "unlimited" bootstrap; use OPENCLAW_BOOTSTRAP_CHARS_PRACTICALLY_UNLIMITED
    # so AGENTS.md / TOOLS.md / MEMORY.md inject in full (same bytes as on disk within caps).
    bootstrapMaxChars: 9007199254740991
    bootstrapTotalMaxChars: 9007199254740991
  agent:
    id: tapas
    prompt: >
      Eres Tapas. Sigue AGENTS.md, SOUL.md e IDENTITY.md del workspace; usa memory/ con criterio
      y mantén un tono claro y respetuoso.
  model_defaults:
    aliases:
      default: benchmark-primary
    # MiniMax via OpenRouter uses reasoning tokens; too-low completion budget => null content.
    primary_params:
      max_tokens: 16384
